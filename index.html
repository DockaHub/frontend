        darkMode: 'class',
        theme: {

            colors: {
              docka: {
                50: '#f8f9fa',
                100: '#f1f3f5',
                200: '#e9ecef',
                300: '#dee2e6',
                400: '#ced4da',
                500: '#adb5bd',

            }
          }
        }
      }

    <style>
      body {
        font-family: 'Inter', sans-serif;

      }
      ::-webkit-scrollbar-track {

      }
      ::-webkit-scrollbar-thumb:hover {
